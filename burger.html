<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burger Cart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #fdf2e9;
    }
    h1 {
      text-align: center;
    }
    .menu, .cart {
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .burger {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    button {
      padding: 6px 10px;
      background-color: #ff6f00;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .cart-items {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🍔 Burger Cart</h1>

  <div class="menu">
    <div class="burger">
      <span>Classic Burger - Rs=90</span>
      <button onclick="addToCart('Classic Burger', 90)">Add</button>
    </div>
    <div class="burger">
      <span>Cheese Burger - Rs=80</span>
      <button onclick="addToCart('Cheese Burger', 80)">Add</button>
    </div>
    <div class="burger">
      <span>Veggie Burger - Rs=75</span>
      <button onclick="addToCart('Veggie Burger', 75)">Add</button>
    </div>
    
  </div>

  <div class="cart">
    <h2>🛒 Cart</h2>
    <div class="cart-items" id="cartItems">
      <p>No items yet.</p>
    </div>
    <h3>Total: Rs<span id="total">0</span></h3>
  </div>

  <script>
    const cartItems = [];
    let total = 0;

    function addToCart(name, price) {
      cartItems.push({ name, price });
      total += price;
      renderCart();
    }

    function renderCart() {
      const cartDiv = document.getElementById("cartItems");
      cartDiv.innerHTML = "";
      cartItems.forEach((item, index) => {
        const itemDiv = document.createElement("div");
        itemDiv.textContent = `${item.name} - RS=${item.price}`;
        cartDiv.appendChild(itemDiv);
      });
      document.getElementById("total").textContent = total;
    }
  </script>

</body>
</html>
